spring:
  application:
    name: chrip

  data:
    redis:
      host: "redis-18104.c340.ap-northeast-2-1.ec2.cloud.redislabs.com"
      password: ${REDIS_PASSWORD}
      username: "default"
      port: 18104
      connect-timeout: 5000ms
      timeout: 2000ms

  datasource:
    #url: jdbc:postgresql://db.lyazijzwkckdufaozdug.supabase.co:5432/postgres?sslmode=require
    url: jdbc:postgresql://aws-1-ap-southeast-2.pooler.supabase.com:6543/postgres?user=postgres.lyazijzwkckdufaozdug&password=${POSTGRES_PASSWORD}
    username: postgres
    #password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver

    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 12000000
      validation-timeout: 5000
      pool-name: SpringBootHikariCP
      data-source-properties:
        prepareThreshold: 5
        preparedStatementCacheQueries: 256
        preparedStatementCacheSizeMiB: 5

        tcpKeepAlive: true
        socketTimeout: 30
        connectTimeout: 10

  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        show_sql: true

  mail:
    port: 587
    password: ${MAILGUN_PASSWORD}
    properties:
      mail:
        SMTP:
          auth: true
          STARTTLS:
            enable: true

  rabbitmq:
    host: raccoon.lmq.cloudamqp.com
    password: ${RABBITMQ_PASSWORD}
    username: ihjahdxs
    ssl:
      enabled: true
    virtual-host: ihjahdxs
    listener:
      simple:
        acknowledge-mode: auto # retry auto
        concurrency: 1 # free plan
        max-concurrency: 3
        prefetch: 10 # max number of messages that haven't been processed
        default-requeue-rejected: true # automatically requeue rejected messages/events
        retry:
          enabled: true
          initial-interval: 1000ms # wait between re-trials
          max-interval: 10000ms
          max-retries: 3
          multiplier: 2 # exponential backoff

jwt:
  secret: ${JWT_SECRET_BASE64}

chrip:
  email:
    verification:
      expiry-hours: 24
    reset-password:
      expiry-minutes: 30

nginx:
  trusted-ips:
    - "127.0.0.1"       # nginx on same machine
    - "::1"             # IPv6 localhost
    - "172.17.0.0/16"   # nginx container IP when using Docker
    - "10.0.0.5/32"     # nginx server IP (if separate machine)